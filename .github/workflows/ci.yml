name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: npm ci

      - name: Typecheck app + web
        run: npm run typecheck

      - name: Build web smoke test
        run: npm run build:web
